<!DOCTYPE html>
<html lang="en">
<head>
    <script src="pet.js"></script>
    <link rel="stylesheet" href="pet.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Pet - AgendaEz</title>
</head>
<body>
    
    <button id="themeToggle" class="theme-toggle">🌙 Dark Mode</button>
<nav class="nav-bar">
    <button onclick="window.location.href='index.html'" class="nav-btn">📅 Organizer</button>
    <button onclick="window.location.href='pet.html'" class="nav-btn">🐾 My Pet</button>
    <button onclick="window.location.href='homescreen.html'" class="nav-btn">🏠 Home</button>
</nav>

    <div class="points-display">
        ⭐ Points: <span id="pointsCount">0</span>
    </div>

    <div class="pet-container">
        <div class="pet-selection">
            <div class="pet-option owned selected" onclick="selectPet('🐱')" data-pet="🐱">
                <span>🐱</span>
                <span class="pet-price">Starter Pet</span>
            </div>
            <div class="pet-option" onclick="purchasePet('🐶', 100)" data-pet="🐶">
                <span>🐶</span>
                <span class="pet-price">⭐️ 100</span>
            </div>
            <div class="pet-option" onclick="purchasePet('🐰', 200)" data-pet="🐰">
                <span>🐰</span>
                <span class="pet-price">⭐️ 200</span>
            </div>
            <div class="pet-option" onclick="purchasePet('🐹', 300)" data-pet="🐹">
                <span>🐹</span>
                <span class="pet-price">⭐️ 300</span>
            </div>
            <div class="pet-option" onclick="purchasePet('🦊', 500)" data-pet="🦊">
                <span>🦊</span>
                <span class="pet-price">⭐️ 500</span>
            </div>
            <div class="pet-option" onclick="purchasePet('🐼', 1000)" data-pet="🐼">
                <span>🐼</span>
                <span class="pet-price">⭐️ 1000</span>
            </div>
        </div>
        <div class="pet-avatar" id="petAvatar">🐱</div>
        <div class="pet-name">
            <span id="petName">Cat</span>
            <button class="edit-name-button" onclick="editName()">✏️</button>
            <span class="name-change-price">⭐️ 50</span>
        </div>

       <!-- Inside .pet-container, replace the duplicate petAvatar and foodEmoji with: -->
<div class="pet-avatar-container" style="position: relative; display: flex; align-items: center; justify-content: center; margin: 1.5em 0;">
  <span id="petAvatar" style="font-size: 4em; position: relative; z-index: 1;">🐱</span>
  <span id="foodEmoji" style="display:none; font-size:2em; position: absolute; left: 50%; top: 120%; transform: translateX(-50%); z-index: 2;">🍖</span>
  <span id="playEmoji" style="display:none; font-size:2em; position: absolute; left: 50%; top: 120%; transform: translateX(-50%); z-index: 2;">🎾</span>
  <span id="sleepEmoji" style="display:none; font-size:2em; position: absolute; left: 50%; top: 120%; transform: translateX(-50%); z-index: 2;">💤</span>
  <span id="petHand" style="display:none; font-size:2em; position: absolute; left: 50%; top: 120%; transform: translateX(-50%); z-index: 2;">🤚</span>
</div>


        
        <div class="exp-container">
            <div class="level-display">
                <span>Level</span>
                <span class="level-badge" id="levelDisplay">1</span>
            </div>
            <div class="exp-bar">
                <div class="exp-fill" id="expFill"></div>
            </div>
            <div id="expText">0 / 100 EXP</div>
        </div>

        <div class="pet-stats">
            <div class="stat">
                <div>Happiness</div>
                <div id="happiness">100%</div>
            </div>
            <div class="stat">
                <div>Energy</div>
                <div id="energy">100%</div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="action-button" onclick="feed()">
                <span>🍖</span>
                <span>Feed - 5 Points</span>
            </button>
            <button class="action-button" onclick="play()">
                <span>🎾</span>
                <span>Play - 10 Points</span>
            </button>
            <button class="action-button" onclick="sleep()">
                <span>😴</span>
                <span>Sleep - 50 Points</span>
            </button>
            <button class="action-button" onclick="pet()">
                <span>💝</span>
                <span>Pet - 5 Points</span>
            </button>
        </div>
    </div>

    
</body>
</html>
